{% extends 'base.html' %}

{% block content %}

<h2 style="text-align:center; margin-top:30px;">Available Teachers</h2>

<div id="teacherContainer" style="display:flex; gap:20px; flex-wrap:wrap; padding:40px;"></div>

<script>

function loadTeachers() {
    fetch("/api/teachers/", {
        credentials: "same-origin"
    })
    .then(response => response.json())
    .then(data => {
        const container = document.getElementById("teacherContainer");
        container.innerHTML = "";

        if (data.length === 0) {
            container.innerHTML = "<p>No teachers available.</p>";
            return;
        }

        data.forEach(teacher => {
            container.innerHTML += `
                <div style="background:white; padding:20px; width:250px; border-radius:10px; box-shadow:0 5px 20px rgba(0,0,0,0.1);">
                    <h3>${teacher.username}</h3>
                    <p><strong>Skill:</strong> ${teacher.teacher_skill || 'Not added'}</p>
                    <p><strong>Experience:</strong> ${teacher.teacher_experience || '0'} years</p>
                    <p><strong>Charge:</strong> ₹${teacher.teacher_charge || '0'}</p>
                    <p><strong>Availability:</strong> ${teacher.teacher_availability || 'Not set'}</p>

                    ${teacher.booking_status === null ? `
                        <button onclick="bookTeacher(${teacher.id})"
                            style="margin-top:10px; padding:8px; width:100%; background:#1e40af; color:white; border:none; border-radius:5px;">
                            Book Now
                        </button>
                    ` : `
                        <button disabled
                            style="margin-top:10px; padding:8px; width:100%; background:gray; color:white; border:none; border-radius:5px;">
                            ${teacher.booking_status.toUpperCase()}
                        </button>
                    `}
                </div>
            `;
        });
    })
    .catch(error => console.log(error));
}

function bookTeacher(teacherId) {

    fetch("/api/book/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        credentials: "same-origin",
        body: JSON.stringify({
            teacher: teacherId,
            date: "2026-03-01",
            time: "10:00"
        })
    })
    .then(response => {
        if (!response.ok) {
            alert("Booking failed.");
            return;
        }
        return response.json();
    })
    .then(data => {
        if (data) {
            alert("Booking request sent successfully!");
            loadTeachers();   // 🔥 reload cards to update button
        }
    })
    .catch(error => console.log(error));
}

loadTeachers();

</script>

{% endblock %}
