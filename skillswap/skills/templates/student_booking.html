{% extends 'base.html' %}

{% block content %}

<h2 style="text-align:center; margin-top:30px;">My Booking Requests</h2>

<div id="bookingContainer" style="padding:40px;"></div>

<script>

function loadBookings() {
    fetch("/api/student/bookings/", {
        credentials: "same-origin"
    })
    .then(response => response.json())
    .then(data => {

        const container = document.getElementById("bookingContainer");
        container.innerHTML = "";

        if (data.length === 0) {
            container.innerHTML = "<p>No booking requests yet.</p>";
            return;
        }

        data.forEach(booking => {

            container.innerHTML += `
                <div style="background:white; padding:20px; margin-bottom:20px; border-radius:10px; box-shadow:0 5px 20px rgba(0,0,0,0.1);">

                    <h3>Teacher: ${booking.teacher_name}</h3>
                    <p><strong>Skill:</strong> ${booking.teacher_skill || "Not added"}</p>
                    <p><strong>Charge:</strong> ₹${booking.teacher_charge || 0}</p>
                    <p><strong>Date:</strong> ${booking.date}</p>
                    <p><strong>Time:</strong> ${booking.time}</p>
                    <p><strong>Status:</strong>
                        <span style="
                            padding:5px 10px;
                            border-radius:5px;
                            background:${booking.status === 'approved' ? 'green' : booking.status === 'rejected' ? 'red' : 'orange'};
                            color:white;">
                            ${booking.status.toUpperCase()}
                        </span>
                    </p>

                    ${booking.status === "pending" ? `
                        <button onclick="cancelBooking(${booking.id})"
                            style="margin-top:10px; padding:8px 12px; background:red; color:white; border:none; border-radius:5px;">
                            Cancel Request
                        </button>
                    ` : ""}

                </div>
            `;
        });

    });
}

function cancelBooking(bookingId) {

    fetch(`/api/student/bookings/${bookingId}/`, {
        method: "DELETE",
        headers: {
            "X-CSRFToken": "{{ csrf_token }}"
        },
        credentials: "same-origin"
    })
    .then(response => {
        if (!response.ok) {
            alert("Cancel failed.");
            return;
        }
        alert("Booking cancelled.");
        loadBookings();
    });

}

loadBookings();

</script>

{% endblock %}
